# ============================================================
# docker-compose.yml - Orquestração de containers
# Serviços: postgres, backend (Node/Express), frontend (React/Vite)
# Todos na mesma rede privada para comunicação interna
# ============================================================

version: '3.8'

services:

  # -----------------------------------------------------------
  # PostgreSQL - Banco de dados relacional
  # -----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres_study
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-study_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-study_password}
      POSTGRES_DB: ${DB_NAME:-study_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - study_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-study_user} -d ${DB_NAME:-study_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # -----------------------------------------------------------
  # Backend - Node.js 18 + Express
  # Depende do postgres estar saudável antes de iniciar
  # -----------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend_study
    restart: always
    env_file:
      - .env
    environment:
      DB_HOST: postgres       # Nome do serviço Docker (DNS interno)
      DB_PORT: 5432
      DB_USER: ${DB_USER:-study_user}
      DB_PASSWORD: ${DB_PASSWORD:-study_password}
      DB_NAME: ${DB_NAME:-study_db}
      PORT: ${BACKEND_PORT:-5000}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    volumes:
      - ./backend:/app          # Hot-reload do código
      - /app/node_modules       # Preservar node_modules do container
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - study_network

  # -----------------------------------------------------------
  # Frontend - React 18 + Vite
  # Depende do backend estar disponível
  # -----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_study
    restart: always
    env_file:
      - .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:5000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - study_network

volumes:
  postgres_data:
    driver: local

networks:
  study_network:
    driver: bridge
